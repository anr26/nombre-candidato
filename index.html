<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>PADRONAPP - Padrón ANR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --primary-red: #d10000;
            --primary-orange: #ff8c33;
            --bg-gray: #f4f7f6;
            --text-dark: #1a1a1a;
            --text-muted: #6b7280;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 0;
            background-color: var(--bg-gray); 
            color: var(--text-dark);
            margin: 0;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; text-align: center; padding: 0 10px; }
        
        .compact-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
            width: calc(100% + 20px);
            margin-left: -10px;
        }
        
        .social-links { 
            display: flex; 
            gap: 12px; 
        } 
        .social-links img { 
            width: 24px;
            height: 24px;
        }
        
        .card {
            background: white;
            padding: 8px 12px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 8px;
            text-align: left;
        }

        .form-group { margin-bottom: 12px; }
        label { font-weight: 600; font-size: 14px; margin-bottom: 6px; display: block; color: var(--text-muted); }
        input#cedula { 
            width: 100%; 
            padding: 8px 12px;
            border: 2px solid #e5e7eb; 
            background-color: #f9fafb; 
            border-radius: 12px; 
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input#cedula:focus { 
            border-color: var(--primary-orange); 
            box-shadow: 0 0 0 4px rgba(255, 140, 51, 0.1);
            background-color: white;
        }
        
        .btn-row { display: flex; gap: 8px; margin-top: 4px; }
        .btn { 
            padding: 8px 12px;
            border-radius: 12px; 
            font-size: 14px;
            font-weight: 600; 
            cursor: pointer; 
            flex: 1; 
            border: none;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active { transform: scale(0.98); }
        .btn-orange { background-color: var(--primary-orange); color: white; }
        .btn-outline { background-color: transparent; border: 2px solid #e5e7eb; color: var(--text-muted); }
        
        .proposal-strip {
            background-color: var(--primary-red);
            color: white;
            padding: 8px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 8px;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        #result-container { display: none; }
        
        .result-full { border-bottom: 1px solid #f3f4f6; padding: 6px 0; }
        .result-full:last-child { border-bottom: none; }
        .result-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .result-value { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0; }
        .grid-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 4px; }
        
        .grid-col { padding: 8px; background-color: #f9fafb; border-radius: 10px; text-align: center; }
        .grid-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .grid-value { font-size: 12px; font-weight: 700; color: var(--primary-red); margin-top: 2px; }

        .candidate-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-top: 4px;
            box-shadow: var(--card-shadow);
        }
        .candidate-photo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        #loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); display: flex; align-items: center; 
            justify-content: center; z-index: 1000; font-weight: 700; color: var(--primary-red);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: white;
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--card-shadow);
        }
        .modal-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
    </style>


    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="PadronApp">
    <link rel="apple-touch-icon" href="padronapp.png">
</head>


<body>
    <div id="loading-overlay">Cargando base de datos...</div>

    <div class="container">
        <div class="compact-header">
            <div style="font-weight: 700; font-size: 13px; color: var(--text-dark); text-align: left; line-height: 1.2;">Padrón ANR 2026 - Fernando de la Mora</div>
            <div class="social-links">
                <img src="facl.png" alt="FB">
                <img src="insl.png" alt="IG">
                <img src="whal.png" alt="WA">
            </div>
        </div>
        
        <div id="search-card" class="card">
            <div class="form-group">
                <label for="cedula">Cédula de Identidad</label>
                <input type="number" id="cedula" placeholder="Ingrese su número de CI" inputmode="numeric">
            </div>
            <div id="search-btns" class="btn-row">
                <button class="btn btn-orange" id="aceptar">Consultar</button>
                <button class="btn btn-outline" id="limpiar">Limpiar</button>
            </div>
            <a href="propuesta.pdf" target="_blank" class="proposal-strip">CONOCÉ NUESTRA PROPUESTA AQUÍ (PDF)</a>
        </div>

        <div id="result-container" class="card" style="display: none;">
            <!-- Custom rendered results -->
        </div>
    </div>

    <script>
        window.csvData = [];
        let currentRecord = null;
        let isLoaded = false;

        const loader = document.getElementById('loading-overlay');
        const searchCard = document.getElementById('search-card');
        const searchBtns = document.getElementById('search-btns');
        const cedulaInput = document.getElementById('cedula');
        const containerDiv = document.querySelector('.container');
        const resultContainer = document.getElementById('result-container');
        
        loader.style.display = 'flex';
        
        Papa.parse('padronapp.csv', {
            download: true,
            header: true,
            delimiter: ";",
            encoding: "ISO-8859-1",
            skipEmptyLines: true,
            complete: function(results) {
                window.csvData = results.data;
                isLoaded = true;
                loader.style.display = 'none';
                console.log('CSV Loaded');
            },
            error: function(err) {
                loader.textContent = 'Error al cargar datos.';
            }
        });

        function toggleSearchState(isMinimized) {
            if (isMinimized) {
                searchBtns.style.display = 'none';
                searchCard.style.padding = '12px';
            } else {
                searchBtns.style.display = 'flex';
                searchCard.style.padding = '16px';
            }
        }

        cedulaInput.addEventListener('focus', () => {
            if (currentRecord && searchBtns.style.display === 'none') {
                searchBtns.style.display = 'flex';
            }
        });

        function renderResult(record) {
            resultContainer.innerHTML = '';
            if (!record) {
                resultContainer.style.display = 'none';
                return;
            }
            resultContainer.style.display = 'block';
            
            resultContainer.innerHTML = `
                <div class="result-full">
                    <div class="result-label">Nombre Completo</div>
                    <div class="result-value">${record.cedula} - ${record.nombre} ${record.apellido}</div>
                </div>
                <div class="result-full">
                    <div class="result-label">Local de Votación</div>
                    <div class="result-value">${record.local_votacion}</div>
                </div>
                <div class="grid-row">
                    <div class="result-item">
                        <div class="result-label">Mesa</div>
                        <div class="result-value">${record.mesa}</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Orden</div>
                        <div class="result-value">${record.orden}</div>
                    </div>
                </div>
                <div class="result-full">
                    <div class="result-label">Dirección</div>
                    <div class="result-value">${record.direccion}</div>
                </div>
                <div class="grid-row-3">
                    <div class="grid-col">
                        <div class="grid-label">Nacimiento</div>
                        <div class="grid-value">${record.fecha_nacimiento}</div>
                    </div>
                    <div class="grid-col">
                        <div class="grid-label">Afiliación</div>
                        <div class="grid-value">${record.fecha_afiliacion}</div>
                    </div>
                    <div class="grid-col">
                        <div class="grid-label">Edad</div>
                        <div class="grid-value">${record.edad}</div>
                    </div>
                </div>
                <div class="candidate-card">
                    <img src="logoindex.png" class="candidate-photo" alt="Candidato">
                    <div style="text-align: left;">
                        <div style="font-size: 14px; font-weight: 600;">NOMBRE DEL CANDIDATO</div>
                        <div style="font-size: 14px;">Lista 1 - <b>Opción [X]</b></div>
                    </div>
                </div>
            `;
        }

        document.getElementById('aceptar').addEventListener('click', () => {
            if (!isLoaded) {
                alert('La base de datos aún se está cargando.');
                return;
            }
            const val = cedulaInput.value.trim();
            if (!val) {
                alert('Por favor, ingrese un número de cédula.');
                return;
            }
            currentRecord = window.csvData.find(r => r.cedula === val);
            if (currentRecord) {
                renderResult(currentRecord);
                toggleSearchState(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert('El número de cédula no se encuentra en el padrón.');
                renderResult(null);
                toggleSearchState(false);
            }
        });

        document.getElementById('limpiar').addEventListener('click', () => {
            cedulaInput.value = '';
            currentRecord = null;
            renderResult(null);
            toggleSearchState(false);
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker registrado', reg))
                    .catch((err) => console.error('Error al registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
